<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Serif:wght@700;800&amp;family=Cinzel:wght@700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#003641",
              "on-error": "#690005",
              "on-surface": "#e5e2e1",
              "error-container": "#93000a",
              "surface-container-high": "#2a2a2a",
              "inverse-primary": "#745b00",
              "secondary-container": "#59470c",
              "on-tertiary-fixed-variant": "#004e5e",
              "surface": "#131313",
              "on-error-container": "#ffdad6",
              "surface-container-highest": "#353534",
              "tertiary-container": "#49dbff",
              "outline-variant": "#4e4633",
              "background": "#131313",
              "on-secondary": "#3d2f00",
              "surface-variant": "#353534",
              "on-secondary-fixed-variant": "#56450a",
              "error": "#ffb4ab",
              "surface-container-lowest": "#0e0e0e",
              "on-primary": "#3d2f00",
              "secondary": "#dec47e",
              "primary-container": "#f5c518",
              "on-primary-fixed": "#241a00",
              "primary-fixed": "#ffe08b",
              "surface-dim": "#131313",
              "inverse-surface": "#e5e2e1",
              "on-primary-fixed-variant": "#584400",
              "surface-container-low": "#1c1b1b",
              "tertiary": "#bdefff",
              "on-tertiary-fixed": "#001f27",
              "on-secondary-container": "#d0b671",
              "surface-container": "#201f1f",
              "surface-tint": "#f0c110",
              "on-surface-variant": "#d1c5ac",
              "primary": "#ffe5a0",
              "tertiary-fixed-dim": "#42d7fb",
              "outline": "#9a9078",
              "primary-fixed-dim": "#f0c110",
              "on-background": "#e5e2e1",
              "inverse-on-surface": "#313030",
              "secondary-fixed": "#fce097",
              "on-tertiary-container": "#005e70",
              "secondary-fixed-dim": "#dec47e",
              "surface-bright": "#3a3939",
              "on-secondary-fixed": "#241a00",
              "on-primary-container": "#695200",
              "tertiary-fixed": "#b0ecff"
            },
            fontFamily: {
              "headline": ["Cinzel", "serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"],
              "serif-title": ["Noto Serif", "serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
        }
        .grain-overlay {
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCcrnc2oI9QX1EJidxdCtVVRtrSg1PXcBWjEq53HxXOyGJarO9rUlQUdgbVC-lEE5l_iRCn1NT4z2Zchz5_RoVmxnb_ZfpWtPjONVBounoTqVggbrOOoASvCS7xUfnMaNTFb_r5BnBiyNuw8aI3cMIbXL3doNboAIpimWoIJssH4AXrTv1JAqo4g5RAjRQ6ilSQDQuDvWe7B0cYiN5k5Zx9P9HHBtT5zDn0VGPzVVSKSgivAEckix3ALvjrfEpdWkCqnG3cMW9Yx-o);
            opacity: 0.03;
            pointer-events: none
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5
        }
        .glass-panel {
            background: rgba(32, 31, 31, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        body {
            min-height: max(884px, 100dvh);
        }
        .title-card-letter-spacing {
            letter-spacing: 0.15em;
        }
        .label-letter-spacing {
            letter-spacing: 0.25em;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Film Grain Overlay -->
<div class="fixed inset-0 z-[100] grain-overlay"></div>
<!-- Top Navigation -->
<header class="fixed top-0 w-full z-50 glass-panel shadow-[0_16px_32px_0_rgba(0,0,0,0.4)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#F5C518]" data-icon="local_movies">local_movies</span>
<span class="text-xl font-bold tracking-[0.1em] text-[#F5C518] font-headline">CINELOG</span>
</div>
<div class="text-[#F5C518] font-serif-title font-bold text-sm tracking-tight bg-surface-container-high/50 px-3 py-1 rounded-full border border-primary-container/20">
            128 XP • 7 🔥
        </div>
</div>
</header>
<!-- Main Content -->
<main class="min-h-screen pt-24 pb-32 px-4 flex justify-center">
<div class="w-full max-w-lg">
<!-- Compact Header Section -->
<section class="relative mb-8 flex gap-5 items-center">
<div class="w-24 aspect-[2/3] rounded-lg overflow-hidden shadow-2xl relative shrink-0">
<img alt="Oppenheimer poster" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJ7lJbqT3X0MCKqk_clBvLfsE30vWqs4JxxKGgTXHvKtv8ULTANQydeAtADLCqJKnFxxhqzBytVHrUya55WhZnIZQJFuvOGQfzArMdnFX6IlFP1jBNRqkFVbjLmd3KC-7XndtV6rEdcTrubLS91kNmDbxgAFQHaDQ-EA7DwwtpWScYHLBV5q_eX4wvYpr-4cftK-78ZtBol5RjcEzK2xkACVZzQjIiK7u0hTsl7AMKLLrNIWerIGZxwx032WltPhDrY407oZNCPOM"/>
<div class="absolute inset-0 ring-1 ring-inset ring-white/10 rounded-lg"></div>
</div>
<div class="flex-1">
<h2 class="font-headline text-2xl font-black uppercase title-card-letter-spacing mb-2 text-on-surface leading-tight">
                    Oppenheimer
                </h2>
<div class="flex flex-wrap gap-x-3 gap-y-1 items-center opacity-60">
<span class="font-label text-[10px] uppercase tracking-[0.1em]">C. Nolan</span>
<span class="w-1 h-1 bg-on-surface-variant rounded-full"></span>
<span class="font-label text-[10px] uppercase tracking-[0.1em]">2023</span>
<span class="w-1 h-1 bg-on-surface-variant rounded-full"></span>
<span class="font-label text-[10px] uppercase tracking-[0.1em]">180 MIN</span>
</div>
</div>
</section>
<!-- Log Card with Glassmorphism -->
<div class="glass-panel p-6 rounded-2xl shadow-xl space-y-8">
<!-- Date Picker (Compact) -->
<div class="space-y-3">
<label class="font-headline text-[9px] uppercase label-letter-spacing text-on-surface-variant/80 font-bold">Log Date</label>
<div class="relative">
<input class="w-full bg-surface-container-highest/40 border border-white/5 focus:border-primary-container focus:ring-0 rounded-xl p-3.5 font-body text-on-surface transition-all duration-300" type="date" value="2023-10-24"/>
</div>
</div>
<!-- Rating System (Compact) -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<label class="font-headline text-[9px] uppercase label-letter-spacing text-on-surface-variant/80 font-bold">Rating</label>
<span class="font-serif-title text-xl text-primary-container">4.5</span>
</div>
<div class="flex items-center justify-between bg-white/5 p-4 rounded-xl border border-white/5">
<div class="flex gap-0.5 text-primary-container">
<span class="material-symbols-outlined text-3xl cursor-pointer" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-3xl cursor-pointer" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-3xl cursor-pointer" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-3xl cursor-pointer" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-3xl cursor-pointer">star_half</span>
</div>
<span class="font-label text-[9px] uppercase tracking-widest opacity-40">Tap stars</span>
</div>
</div>
<!-- Atmosphere (Compact Tags) -->
<div class="space-y-3">
<label class="font-headline text-[9px] uppercase label-letter-spacing text-on-surface-variant/80 font-bold">Atmosphere</label>
<div class="flex flex-wrap gap-2">
<button class="px-3.5 py-1.5 bg-primary-container text-on-primary rounded-full font-label text-[10px] uppercase tracking-wider transition-all">Intense</button>
<button class="px-3.5 py-1.5 bg-surface-container-high/60 text-on-surface-variant border border-white/5 rounded-full font-label text-[10px] uppercase tracking-wider transition-all">Mind-bending</button>
<button class="px-3.5 py-1.5 bg-surface-container-high/60 text-on-surface-variant border border-white/5 rounded-full font-label text-[10px] uppercase tracking-wider transition-all">Visceral</button>
<button class="px-3.5 py-1.5 bg-primary-container text-on-primary rounded-full font-label text-[10px] uppercase tracking-wider transition-all">Masterpiece</button>
</div>
</div>
<!-- Review Field (Compact) -->
<div class="space-y-3">
<label class="font-headline text-[9px] uppercase label-letter-spacing text-on-surface-variant/80 font-bold">Journal Entry</label>
<textarea class="w-full bg-white/5 border border-white/5 focus:border-primary-container focus:ring-0 rounded-xl p-4 font-body text-sm text-on-surface placeholder:text-on-surface-variant/30 transition-all duration-300 resize-none" placeholder="Thoughts on this viewing..." rows="3"></textarea>
</div>
<!-- CTA -->
<div class="pt-4">
<button class="w-full bg-primary-container hover:bg-primary-fixed-dim text-on-primary font-headline uppercase tracking-widest py-4 rounded-xl text-sm shadow-lg transition-all duration-300 active:scale-[0.98] group flex items-center justify-center gap-2.5">
<span>Log to Diary</span>
<span class="material-symbols-outlined text-lg transition-transform group-hover:translate-x-1" data-icon="auto_stories">auto_stories</span>
</button>
<p class="text-center mt-4 font-label text-[9px] uppercase tracking-[0.2em] text-on-surface-variant/40">Artifact will be archived</p>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 glass-panel rounded-t-2xl shadow-[0_-16px_32px_0_rgba(0,0,0,0.4)] md:hidden border-t-0">
<div class="flex justify-around items-center h-20 w-full pb-safe">
<a class="flex flex-col items-center justify-center text-[#d1c5ac] opacity-50 hover:opacity-100 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="movie_filter">movie_filter</span>
<span class="font-['Inter'] text-[9px] font-medium tracking-[0.1em] uppercase mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#d1c5ac] opacity-50 hover:opacity-100 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="font-['Inter'] text-[9px] font-medium tracking-[0.1em] uppercase mt-1">Watchlist</span>
</a>
<a class="flex flex-col items-center justify-center text-[#F5C518]" href="#">
<span class="material-symbols-outlined" data-icon="history_edu">history_edu</span>
<span class="font-['Inter'] text-[9px] font-bold tracking-[0.1em] uppercase mt-1">Diary</span>
</a>
<a class="flex flex-col items-center justify-center text-[#d1c5ac] opacity-50 hover:opacity-100 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="font-['Inter'] text-[9px] font-medium tracking-[0.1em] uppercase mt-1">Profile</span>
</a>
</div>
</nav>
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
<div class="absolute -top-[10%] -right-[10%] w-[50%] h-[50%] bg-primary-container/5 blur-[120px] rounded-full"></div>
<div class="absolute top-[40%] -left-[10%] w-[30%] h-[30%] bg-white/5 blur-[80px] rounded-full"></div>
</div>
</body></html>
